<!DOCTYPE html>
<html>
<head>
    <title>Register - Heart AI</title>
    <style>
        body { font-family: Arial, sans-serif; background: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.1); width: 100%; max-width: 350px; }
        .header { background: #33AEFF; margin: -40px -40px 30px -40px; padding: 20px; color: white; text-align: center; border-radius: 12px 12px 0 0; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #33AEFF; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 16px; }
        .link { text-align: center; margin-top: 15px; font-size: 14px; }
        .link a { color: #33AEFF; text-decoration: none; }
    </style>
</head>
<body>
    <div class="register-card">
        <div class="header"><h2>Create Account</h2></div>
        <form method="POST">
            <input type="text" name="username" placeholder="Choose Username" required>
            <input type="password" name="password" placeholder="Choose Password" required>
            <button type="submit">Join IoT Club Project</button>
        </form>
        <div class="link">Already have an account? <a href="/login">Login here</a></div>
    </div>
</body>
</html>
